# ============================================================================
# Dedicated TEST configuration (issue #231)
# Guarantees tests never touch the real database or external systems and that
# the suite runs fully offline. Activated via @ActiveProfiles("test").
# ============================================================================

# Keep test start-up quiet.
spring.main.banner-mode=off

# --- Persistence -------------------------------------------------------------
# This project uses in-memory repositories, so there is no production datasource
# to point away from. If a JDBC datasource is ever introduced, the test profile
# must use an in-memory H2 database (never a real/production DB):
#   spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
#   spring.datasource.driver-class-name=org.h2.Driver
#   spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
#   spring.jpa.hibernate.ddl-auto=create-drop

# --- External systems --------------------------------------------------------
# MUST point to a local stub/WireMock — never the real endpoint
# (https://damp-lynna-wsep-1984852e.koyeb.app/). Keeps payment / ticket issuance
# fully offline during tests.
app.ticketing.url=http://localhost:8089
external.payment.url=http://localhost:8089
external.tickets.url=http://localhost:8089

# --- Bootstrap admin (test-only, not production) -----------------------------
app.admin.username=test-admin
app.admin.password=test-pass-123

# --- System init (required by @Validated SystemInitProperties) ---------------
app.init.max-concurrent-users-per-event=100
app.init.initial-state-file=
app.init.state-file=

logging.level.root=WARN
