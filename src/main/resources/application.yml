spring:
  application:
    name: sadna-group13a

  datasource:
    url: jdbc:h2:mem:sadna;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
app:
  jwt:
    secret-key: sadna-group13a-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 3600000  # 1 hour

  # Seat hold duration
  seat:
    hold-duration-minutes: 10

  # External ticket-issuance system (issue #226)
  ticketing:
    # 'stub' (default, in-memory — used by tests/local) or 'wsep' (real external service).
    mode: stub
    url: https://damp-lynna-wsep-1984852e.koyeb.app/
  # Persistence connection health-check (issue #228 — auto-recovery after data-store outage).
  # This project uses an in-memory data store rather than a JDBC datasource, so instead of
  # HikariCP's connection-test-query we run an equivalent scheduled health check that detects
  # a connection loss and automatically resumes once it is restored — no restart required.
  persistence:
    health-check-interval-ms: 5000

  # Bootstrap admin credentials
  admin:
    username: admin
    password: admin123

  # System initialization parameters (Version 3 — see README "Startup configuration").
  # Bound to SystemInitProperties and validated: invalid/missing values stop startup.
  init:
    # Max users who may hold tickets for one event simultaneously before queuing (>= 1).
    max-concurrent-users-per-event: 100
    # Optional path to an initial-state JSON file executed at startup (issue #224).
    # Leave blank to skip initial-state loading.
    initial-state-file:
    # Optional path to a text-based initial-state file (issue #230).
    # Format: one command per line — register/login/logout/create-company.
    # Blank = clean start.
    state-file: ""

  # External payment service (Version 3 — see README "Payment integration").
  external:
    payment:
      # 'stub' (default, in-memory — used by tests/local) or 'wsep' (real external service).
      mode: stub
      # WSEP endpoint; used only when mode=wsep. URL is read from config, not hardcoded.
      url: https://damp-lynna-wsep-1984852e.koyeb.app/

logging:
  level:
    com.sadna.group13a.domain: DEBUG
    com.sadna.group13a.application: INFO
    com.sadna.group13a.infrastructure: WARN
    root: INFO
