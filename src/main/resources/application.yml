spring:
  application:
    name: sadna-group13a

  datasource:
    url: jdbc:h2:mem:sadna;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  h2:
    console:
      enabled: true
      path: /h2-console

# JWT Configuration
app:
  jwt:
    secret-key: sadna-group13a-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 3600000  # 1 hour

  # Seat hold duration
  seat:
    hold-duration-minutes: 10

  # Bootstrap admin credentials
  admin:
    username: admin
    password: admin123

logging:
  level:
    com.sadna.group13a.domain: DEBUG
    com.sadna.group13a.application: INFO
    com.sadna.group13a.infrastructure: WARN
    root: INFO
