spring:
  application:
    name: sadna-group13a
  datasource:
    url: jdbc:h2:file:./data/sadna-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# JWT Configuration
app:
  jwt:
    secret-key: sadna-group13a-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 3600000  # 1 hour

  # Seat hold duration
  seat:
    hold-duration-minutes: 10

  # Bootstrap admin credentials
  admin:
    username: admin
    password: admin123

logging:
  level:
    com.sadna.group13a.domain: DEBUG
    com.sadna.group13a.application: INFO
    com.sadna.group13a.infrastructure: WARN
    root: INFO
