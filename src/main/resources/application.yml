spring:
  application:
    name: sadna-group13a

  # ── Database connection (Version 3) ────────────────────────────────────────
  # The actual datasource/JPA settings live in the profile files so the system
  # can switch between a local (H2) and a remote (PostgreSQL) database WITHOUT
  # any code change — just activate a different profile:
  #   local : in-memory H2          -> --spring.profiles.active=local
  #   prod  : remote PostgreSQL/GCP -> --spring.profiles.active=prod
  # See application-local.yml / application-prod.yml and the README "Database
  # configuration" section for every parameter.
  #
  # NOTE: these settings only take effect once the JPA starter + JDBC drivers
  # are on the classpath (the persistence/ORM migration is a separate task).
  # Until then Spring ignores spring.datasource.* / spring.jpa.*.
  #
  # Secrets (DB password) must NOT be committed — they come from environment
  # variables (e.g. ${DB_PASSWORD}); see application-prod.yml.

# JWT Configuration
app:
  jwt:
    secret-key: sadna-group13a-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 3600000  # 1 hour

  # Seat hold duration
  seat:
    hold-duration-minutes: 10

  # Bootstrap admin credentials
  admin:
    username: admin
    password: admin123

logging:
  level:
    com.sadna.group13a.domain: DEBUG
    com.sadna.group13a.application: INFO
    com.sadna.group13a.infrastructure: WARN
    root: INFO
